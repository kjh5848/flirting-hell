spring:
  application:
    name: flirting-hell-backend
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

flirting-hell:
  ai:
    provider: ${FLIRTING_HELL_AI_PROVIDER:mock}
    gpt:
      base-url: ${FLIRTING_HELL_GPT_BASE_URL:${FLIRTING_HELL_OPENAI_BASE_URL:https://api.openai.com/v1}}
      api-key: ${FLIRTING_HELL_GPT_API_KEY:${FLIRTING_HELL_OPENAI_API_KEY:${OPENAI_API_KEY:}}}
      model: ${FLIRTING_HELL_GPT_MODEL:${FLIRTING_HELL_OPENAI_MODEL:gpt-4o-mini}}
    gemini:
      base-url: ${FLIRTING_HELL_GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
      api-key: ${FLIRTING_HELL_GEMINI_API_KEY:${GEMINI_API_KEY:}}
      model: ${FLIRTING_HELL_GEMINI_MODEL:gemini-2.5-flash-lite}
    claude:
      base-url: ${FLIRTING_HELL_CLAUDE_BASE_URL:https://api.anthropic.com}
      api-key: ${FLIRTING_HELL_CLAUDE_API_KEY:${ANTHROPIC_API_KEY:}}
      model: ${FLIRTING_HELL_CLAUDE_MODEL:claude-haiku-4-5-20251001}
  firebase:
    project-id: ${FLIRTING_HELL_FIREBASE_PROJECT_ID:}
    service-account-base64: ${FLIRTING_HELL_FIREBASE_SERVICE_ACCOUNT_BASE64:}
    service-account-path: ${FLIRTING_HELL_FIREBASE_SERVICE_ACCOUNT_PATH:}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

---

spring:
  config:
    activate:
      on-profile: default
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

---

spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${FLIRTING_HELL_DB_URL:jdbc:postgresql://localhost:55432/flirting_hell}
    username: ${FLIRTING_HELL_DB_USERNAME:flirting_hell}
    password: ${FLIRTING_HELL_DB_PASSWORD:flirting_hell}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
